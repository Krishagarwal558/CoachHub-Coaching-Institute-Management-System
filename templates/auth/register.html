{% extends "base.html" %}
{% block title %}Register | CoachHub{% endblock %}
{% block content %}
<section class="auth-screen">
  <form class="auth-card" method="post">
    <a class="brand" href="{{ url_for('home') }}"><span class="brand-mark">C</span><span>CoachHub</span></a>
    <h1>Student registration</h1>
    <p>Create a student account. Teachers and additional students can also be created by an admin.</p>
    <label>Full name<input name="name" required placeholder="Ananya Sharma"></label>
    <label>Email<input name="email" type="email" required placeholder="student@example.com"></label>
    <label>Phone<input name="phone" placeholder="9876543210"></label>
    <label>Class<input name="class_name" value="Class 10"></label>
    <label>Password<input name="password" type="password" required minlength="6"></label>
    <button class="button primary full" type="submit">Create student account</button>
    <a href="{{ url_for('login') }}">Already have an account?</a>
  </form>
</section>
{% endblock %}
